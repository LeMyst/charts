{{- if and .Values.mancenter.enabled .Values.mancenter.gateway.enabled }}
{{- $gatewayName := .Values.mancenter.gateway.name | default (include "mancenter.fullname" .) }}
{{- if .Values.mancenter.gateway.create }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gatewayName }}
  labels:
    app.kubernetes.io/name: {{ template "mancenter.name" . }}
    helm.sh/chart: {{ template "hazelcast.chart" . }}
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    {{- range $key, $value := .Values.commonLabels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- if or .Values.mancenter.gateway.annotations .Values.commonAnnotations }}
  annotations:
    {{- merge nil .Values.mancenter.gateway.annotations .Values.commonAnnotations | toYaml | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.mancenter.gateway.className }}
  listeners:
{{ toYaml .Values.mancenter.gateway.listeners | indent 4 }}
{{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "mancenter.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ template "mancenter.name" . }}
    helm.sh/chart: {{ template "hazelcast.chart" . }}
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    {{- range $key, $value := .Values.commonLabels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- if or .Values.mancenter.gateway.annotations .Values.commonAnnotations }}
  annotations:
    {{- merge nil .Values.mancenter.gateway.annotations .Values.commonAnnotations | toYaml | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
  {{- if .Values.mancenter.gateway.host }}
  hostnames:
    - {{ .Values.mancenter.gateway.host | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "mancenter.fullname" . }}
          port: {{ .Values.mancenter.service.port }}
{{- end }}
